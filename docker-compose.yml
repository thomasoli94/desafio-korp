services:
  http-server-projeto-korp:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: http-server-projeto-korp:1.0.0
    container_name: http-server-projeto-korp
    networks:
      - projeto-korp-net
    # SEM 'ports:' — acesso só via NGINX (porta 80).
    healthcheck:
      # Distroless não tem shell/curl. Healthcheck efetivo feito pelo NGINX via proxy_pass.
      disable: true
    restart: unless-stopped
    # Sistema de arquivos somente-leitura — o binário Go é stateless e não precisa escrever.
    read_only: true
    tmpfs:
      - /tmp:size=10m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-projeto-korp
    networks:
      - projeto-korp-net
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d/:ro
    depends_on:
      - http-server-projeto-korp
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # nginx master precisa de CHOWN/SETUID/SETGID para largar privilégios nos workers
    # e NET_BIND_SERVICE para escutar na porta 80 (< 1024).
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - DAC_OVERRIDE

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus-projeto-korp
    networks:
      - projeto-korp-net
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    depends_on:
      - http-server-projeto-korp
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana-projeto-korp
    networks:
      - projeto-korp-net
    ports:
      - "3000:3000"
    environment:
      # ATENÇÃO: credenciais de desenvolvimento — nunca usar em produção.
      # Em produção: usar variáveis de ambiente injetadas pelo CI/CD ou secret manager.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

networks:
  projeto-korp-net:
    name: projeto-korp-net
    driver: bridge

volumes:
  prometheus-data:
    name: projeto-korp-prometheus-data
  grafana-data:
    name: projeto-korp-grafana-data
