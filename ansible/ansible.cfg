[defaults]
inventory        = ./inventory/hosts.ini
roles_path       = ./roles
retry_files_enabled = False
stdout_callback  = yaml
deprecation_warnings = False

# SEGURANÇA: em produção, manter True para evitar ataques MITM.
# False aqui permite rodar o playbook em ambiente local/lab sem configurar known_hosts.
host_key_checking = False

# auto_silent oculta warnings de descoberta de Python — manter 'auto' em produção
# para detectar ambientes com Python ausente ou incorreto.
interpreter_python = auto

[privilege_escalation]
become           = True
become_method    = sudo
become_user      = root
# SEGURANÇA: em produção, manter True para exigir senha sudo.
# False aqui facilita execução em ambiente de desenvolvimento/lab.
become_ask_pass  = False
