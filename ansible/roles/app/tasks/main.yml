---
- name: "Cria diretório do projeto"
  ansible.builtin.file:
    path: /opt/projeto-korp
    state: directory
    mode: '0755'

- name: "Sincroniza arquivos do projeto"
  ansible.posix.synchronize:
    src: "{{ project_root }}/"
    dest: /opt/projeto-korp/
    delete: no
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=ansible"
  when: project_root != "/opt/projeto-korp"

- name: "Build da imagem da aplicação"
  ansible.builtin.command:
    cmd: "docker compose build http-server-projeto-korp"
    chdir: /opt/projeto-korp
  changed_when: true

- name: "Sobe a stack completa"
  ansible.builtin.command:
    cmd: "docker compose up -d"
    chdir: /opt/projeto-korp
  changed_when: true

- name: "Status dos containers"
  ansible.builtin.command:
    cmd: "docker compose ps"
    chdir: /opt/projeto-korp
  register: compose_ps
  changed_when: false

- name: "Exibe status"
  ansible.builtin.debug:
    var: compose_ps.stdout_lines
