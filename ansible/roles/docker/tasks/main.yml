---
- name: "Instala dependências apt"
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: "Cria diretório para chaves apt"
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: "Adiciona chave GPG do Docker"
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: false

- name: "Adiciona repositório Docker"
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: "Instala Docker Engine e plugin Compose"
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: "Habilita e inicia serviço Docker"
  ansible.builtin.systemd:
    name: docker
    enabled: yes
    state: started

- name: "Adiciona usuário ao grupo docker"
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: yes
  when: ansible_user_id != "root"

- name: "Cria rede Docker bridge"
  ansible.builtin.command:
    cmd: "docker network create --driver bridge {{ docker_network_name }}"
  register: docker_network_create
  changed_when: docker_network_create.rc == 0
  failed_when:
    - docker_network_create.rc != 0
    - "'already exists' not in docker_network_create.stderr"
