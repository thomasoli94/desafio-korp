---
# Playbook principal — provisiona TODO o ambiente Projeto Korp num comando:
#   ansible-playbook site.yml
#
# Estrutura por roles separa responsabilidades e facilita reuso/teste:
#   docker      -> instala engine + plugin compose + cria rede bridge
#   app         -> sobe stack do docker-compose (build da imagem incluso)
#   monitoring  -> nada além do que já está no compose (placeholder pra futuras
#                  extensões: alertmanager, exporters extra etc)
#   validate    -> faz HTTP check e mostra a resposta no console (exigência do desafio)

- name: "Provisiona ambiente Projeto Korp (Docker + App + Observabilidade)"
  hosts: korp
  gather_facts: yes
  vars:
    project_root: "{{ playbook_dir }}/.."
    docker_network_name: "projeto-korp-net"
    service_url: "http://localhost:80/projeto-korp"

  pre_tasks:
    - name: "Confirma que o sistema é Debian/Ubuntu (escopo do desafio)"
      ansible.builtin.assert:
        that:
          - ansible_facts['os_family'] == 'Debian'
        fail_msg: "Este playbook foi escrito pra Ubuntu/Debian. Adapte a role 'docker' pra outras distros."

  roles:
    - role: docker
    - role: app
    - role: monitoring

  post_tasks:
    - name: "Aguarda serviços ficarem saudáveis"
      ansible.builtin.pause:
        seconds: 10

    - name: "Valida endpoint /projeto-korp via NGINX (porta 80)"
      ansible.builtin.uri:
        url: "{{ service_url }}"
        method: GET
        return_content: yes
        status_code: 200
      register: korp_response
      retries: 6
      delay: 5
      until: korp_response.status == 200

    - name: "Garante que a resposta tem o campo 'nome' correto"
      ansible.builtin.assert:
        that:
          - korp_response.json.nome == "Projeto Korp"
          - korp_response.json.horario is defined
        fail_msg: "Resposta do serviço não está no formato esperado"
        success_msg: "Resposta validada com sucesso"

    - name: "Resposta do serviço (conforme exigido pelo desafio)"
      ansible.builtin.debug:
        msg:
          - "=================================================="
          - "Ambiente Projeto Korp provisionado com sucesso!"
          - "=================================================="
          - "Endpoint: {{ service_url }}"
          - "Status:   HTTP {{ korp_response.status }}"
          - "Resposta: {{ korp_response.json }}"
          - "--------------------------------------------------"
          - "Grafana:    http://localhost:3000 (admin/admin)"
          - "Prometheus: http://localhost:9090"
          - "=================================================="
