---
- name: "Provisiona ambiente Projeto Korp"
  hosts: korp
  gather_facts: yes
  vars:
    project_root: "{{ playbook_dir }}/.."
    docker_network_name: "projeto-korp-net"
    service_url: "http://localhost:80/projeto-korp"

  pre_tasks:
    - name: "Verifica SO compatível (Debian/Ubuntu)"
      ansible.builtin.assert:
        that:
          - ansible_facts['os_family'] == 'Debian'
        fail_msg: "Playbook suporta apenas Debian/Ubuntu."

  roles:
    - role: docker
    - role: app
    - role: monitoring

  post_tasks:
    - name: "Aguarda serviços iniciarem"
      ansible.builtin.pause:
        seconds: 10

    - name: "Valida endpoint /projeto-korp"
      ansible.builtin.uri:
        url: "{{ service_url }}"
        method: GET
        return_content: yes
        status_code: 200
      register: korp_response
      retries: 6
      delay: 5
      until: korp_response.status == 200

    - name: "Verifica campos da resposta"
      ansible.builtin.assert:
        that:
          - korp_response.json.nome == "Projeto Korp"
          - korp_response.json.horario is defined
        fail_msg: "Resposta fora do formato esperado"

    - name: "Resposta do serviço"
      ansible.builtin.debug:
        msg: "GET {{ service_url }} → HTTP {{ korp_response.status }} | {{ korp_response.json }}"
