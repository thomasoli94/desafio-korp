# Proxy reverso pro http-server-projeto-korp.
# Resolve o upstream via DNS interno do Docker (nome do serviço no compose).
upstream projeto_korp_backend {
    # 'http-server-projeto-korp' é o nome do serviço no docker-compose;
    # Docker faz resolução DNS automática dentro da bridge customizada.
    server http-server-projeto-korp:8080;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    # Logs estruturados ajudam na observabilidade. Em produção, mandaríamos
    # pra stdout/stderr (Docker captura) ou Loki/CloudWatch.
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Healthcheck local do NGINX, útil pra load balancer / autoscaling externos.
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Proxy de TUDO pro backend Go.
    # O desafio pede que requisições em :80 cheguem ao serviço Go em :8080.
    location / {
        proxy_pass http://projeto_korp_backend;

        # Headers padrão de proxy reverso — sem isso, a aplicação backend
        # perde info do cliente original.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # HTTP/1.1 + keepalive economiza conexões TCP pro upstream.
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts: balanço entre paciência com latência real e
        # liberar conexões zumbis rápido.
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}
