upstream projeto_korp_backend {
    server http-server-projeto-korp:8080;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    # Oculta versão do NGINX no header Server e em páginas de erro.
    server_tokens off;

    # Limita corpo da requisição — a API só recebe GET, 1k é mais que suficiente.
    client_max_body_size 1k;

    limit_req_status 429;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Headers de segurança aplicados a todas as respostas.
    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header X-Frame-Options         "DENY"                          always;
    add_header Referrer-Policy         "no-referrer"                   always;
    add_header Cache-Control           "no-store"                      always;

    # /metrics nunca deve ser acessível publicamente.
    # O Prometheus coleta direto da rede interna Docker, sem passar pelo NGINX.
    location = /metrics {
        deny all;
        return 403;
    }

    # Healthcheck interno do NGINX.
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Proxy reverso para o backend Go.
    location / {
        # Rate limiting: 10 req/s por IP, burst de 20 sem delay.
        # Aplicado apenas aqui para não afetar o healthcheck interno.
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://projeto_korp_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}
