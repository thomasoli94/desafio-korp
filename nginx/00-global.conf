# Diretivas no nível http — incluídas antes do server block.
# limit_req_zone define a zona de memória compartilhada para rate limiting:
#   $binary_remote_addr = chave por IP (4 bytes IPv4, 16 bytes IPv6)
#   zone=api_limit:10m  = 10 MB de zona (~160 mil IPs únicos)
#   rate=10r/s          = 10 requisições por segundo por IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
