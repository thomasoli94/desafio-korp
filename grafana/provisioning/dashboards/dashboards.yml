apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: 'Projeto Korp'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # Caminho dentro do container do Grafana onde os JSONs vivem.
      path: /var/lib/grafana/dashboards
